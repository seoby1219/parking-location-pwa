<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>우리집 주차위치</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="offlineBlock" class="offline-block hidden">
    <div class="offline-card">
      <div class="offline-icon">!</div>
      <h2>온라인 연결이 필요합니다</h2>
      <p>정확한 공유를 위해 인터넷과 Firebase 연결이 되었을 때만 주차 위치를 저장하고 확인할 수 있습니다.</p>
      <button id="retryBtn" type="button">다시 연결 확인</button>
    </div>
  </div>

  <main class="app-shell">
    <header class="topbar">
      <button id="userBtn" class="pill-btn big-top-btn" type="button">남편</button>
      <div class="title-wrap">
        <h1>우리집 주차위치</h1>
        <p id="connectionText">Firebase 연결 확인 중</p>
      </div>
      <button id="refreshBtn" class="icon-btn big-top-btn" type="button" aria-label="새로고침">↻</button>
    </header>

    <section class="car-tabs" aria-label="차량 선택">
      <button class="car-card active" data-car="prius" type="button">
        <img id="priusImg" src="./assets/prius.jpg" alt="우스" />
        <strong id="priusNameLabel">우스</strong>
      </button>
      <button class="car-card" data-car="morning" type="button">
        <img id="morningImg" src="./assets/morning.png" alt="모닝" />
        <strong id="morningNameLabel">모닝</strong>
      </button>
    </section>

    <section class="map-section">
      <div class="map-wrap" id="mapWrap">
        <img id="parkingMap" src="./assets/parking-map.jpg" alt="대올골 주차장 지도" draggable="false" />
        <div id="savedPin" class="pin saved hidden" aria-label="저장된 위치"></div>
        <div id="draftPin" class="pin draft hidden" aria-label="선택한 위치"></div>
      </div>
      <p class="hint" id="mapHint">지도를 터치해서 주차 위치를 선택하세요.</p>
    </section>

    <section class="info-card">
      <div class="status-line compact-status">
        <strong id="timeText">저장된 위치가 없습니다.</strong>
      </div>
      <input id="memoInput" type="text" placeholder="메모를 입력하세요(선택)" maxlength="40" />
      <button id="saveBtn" class="primary-btn" type="button" disabled>선택한 위치 저장</button>
    </section>

    <section class="bottom-actions">
      <button id="deleteBtn" class="danger-btn" type="button">위치 삭제</button>
    </section>
  </main>

  <button id="settingsBtn" class="settings-fab" type="button" aria-label="설정">⚙</button>

  <div id="settingsSheet" class="sheet-backdrop hidden">
    <div class="settings-sheet" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="sheet-head">
        <h2 id="settingsTitle">설정</h2>
        <button id="closeSettingsBtn" type="button" aria-label="닫기">×</button>
      </div>

      <div class="setting-group">
        <h3>차량 이름</h3>
        <div class="two-col-inputs">
          <label>우스 <input id="priusNameInput" type="text" maxlength="8" /></label>
          <label>모닝 <input id="morningNameInput" type="text" maxlength="8" /></label>
        </div>
        <button id="saveCarNamesBtn" class="setting-action" type="button">차량 이름 저장</button>
      </div>

      <div class="setting-group">
        <h3>차량 사진 변경</h3>
        <label class="file-line">우스 사진 <input id="priusPhotoInput" type="file" accept="image/*" /></label>
        <label class="file-line">모닝 사진 <input id="morningPhotoInput" type="file" accept="image/*" /></label>
      </div>

      <div class="setting-group">
        <h3>지도 변경</h3>
        <p class="setting-help">지도는 화면 가로폭에 맞춰 표시되고, 세로는 이미지 비율에 따라 자동 적용됩니다.</p>
        <label class="file-line">지도 이미지 <input id="mapImageInput" type="file" accept="image/*" /></label>
      </div>

      <div class="setting-group row-setting">
        <h3>앱 테마</h3>
        <button id="themeBtn" class="setting-action" type="button">밝은 테마 / 어두운 테마</button>
      </div>

      <div class="setting-group">
        <h3>핀 크기</h3>
        <input id="pinSizeInput" type="range" min="34" max="58" step="2" />
      </div>

      <div class="setting-group">
        <h3>Firebase 연결 확인</h3>
        <p id="firebaseStatusText" class="setting-help">확인 중</p>
      </div>

      <button id="resetSettingsBtn" class="setting-reset" type="button">설정 초기화</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
    }
  </script>
</body>
</html>
